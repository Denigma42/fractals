<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fractal Viewer</title>
<style>
body { margin: 0; background: #111; color: #fff; font-family: sans-serif; }
#canvas { display: block; margin: 20px auto; border: 1px solid #333; }
.controls { text-align: center; padding: 10px; }
button { padding: 8px 16px; margin: 0 4px; cursor: pointer; }
</style>
</head>
<body>
<div class="controls">
  <button onclick="loadTile('mandelbrot')">Mandelbrot</button>
  <button onclick="loadTile('julia')">Julia</button>
  <button onclick="loadTile('burning-ship')">Burning Ship</button>
  <label>jr: <input type="number" id="jr" value="-0.7" step="0.01"></label>
  <label>ji: <input type="number" id="ji" value="0.27015" step="0.01"></label>
</div>
<canvas id="canvas" width="256" height="256"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Цветовая палитра (чёрный → синий → зелёный → жёлтый → красный → белый)
function getColor(iter, maxIter) {
    if (iter >= maxIter) return [0, 0, 0];
    const t = iter / maxIter;
    const r = Math.min(255, Math.max(0, Math.floor(255 * (4*t - 1.5))));
    const g = Math.min(255, Math.max(0, Math.floor(255 * (4*t - 0.5))));
    const b = Math.min(255, Math.max(0, Math.floor(255 * (4*t + 0.5))));
    return [r, g, b];
}

// Альтернативная "классическая" палитра
function getColorClassic(iter, maxIter) {
    if (iter >= maxIter) return [0, 0, 0];
    const t = iter / maxIter;
    const r = Math.floor(9 * (1-t) * t * t * t * 255);
    const g = Math.floor(15 * (1-t) * (1-t) * t * t * 255);
    const b = Math.floor(8.5 * (1-t) * (1-t) * (1-t) * t * 255);
    return [r, g, b];
}

async function loadTile(type) {
    const jr = document.getElementById('jr').value;
    const ji = document.getElementById('ji').value;
    
    let url = `http://localhost:8080/tile?z=0&x=0&y=0&type=${type}`;
    if (type === 'julia') {
        url += `&jr=${jr}&ji=${ji}`;
    }

    try {
        const response = await fetch(url);
        if (!response.ok) {
            alert('Error: ' + response.status);
            return;
        }
        
        // Читаем бинарные данные как Uint16Array (little-endian)
        const arrayBuffer = await response.arrayBuffer();
        const data = new Uint16Array(arrayBuffer);
        
        // Определяем maxIter для нормализации
        let maxIter = 0;
        for (let i = 0; i < data.length; i++) {
            if (data[i] > maxIter) maxIter = data[i];
        }
        if (maxIter === 0) maxIter = 1;

        // Рисуем на Canvas
        const width = 256;
        const height = 256;
        canvas.width = width;
        canvas.height = height;
        
        const imageData = ctx.createImageData(width, height);
        const pixels = imageData.data;

        for (let i = 0; i < data.length; i++) {
            const [r, g, b] = getColorClassic(data[i], maxIter);
            pixels[i * 4] = r;      // Red
            pixels[i * 4 + 1] = g;  // Green
            pixels[i * 4 + 2] = b;  // Blue
            pixels[i * 4 + 3] = 255; // Alpha
        }

        ctx.putImageData(imageData, 0, 0);
        
    } catch (err) {
        console.error(err);
        alert('Failed to load: ' + err.message);
    }
}

// Загружаем мандельброт по умолчанию
loadTile('mandelbrot');
</script>
</body>
</html>
